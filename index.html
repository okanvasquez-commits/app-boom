<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050912">
<title>SynthRadar v7.2 Sniper Pro</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
/* ── ESTÉTICA GANADORA RESTAURADA ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050912;--bg2:#0a0f1e;--bg3:#0f1528;
  --green:#00ffb0;--red:#ff2d5e;--amber:#ffb020;--blue:#3b82f6;--purple:#a855f7;
  --text:#d4dff5;--dim:#3d5070;--dim2:#5a7090;
  --border:rgba(0,255,176,0.10);
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'JetBrains Mono',monospace;color:var(--text)}

.screen{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* PANTALLA DE INICIO */
.setup-card{margin:auto;width:90%;max-width:340px;background:var(--bg2);padding:30px;border-radius:12px;border:1px solid var(--border);text-align:center}
.fi{width:100%;padding:16px;background:var(--bg3);border:1px solid #1e2a44;color:#fff;margin:20px 0;border-radius:6px;text-align:center}
.btn-go{background:var(--green);color:var(--bg);border:none;padding:18px;border-radius:8px;width:100%;font-weight:900;font-family:'Orbitron';cursor:pointer}

/* INTERFAZ PRINCIPAL */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:15px;background:rgba(5,9,18,0.9);border-bottom:1px solid var(--border)}
.sbar{display:flex;gap:8px;padding:10px;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border)}
.sbar::-webkit-scrollbar{display:none}
.sbtn{flex-shrink:0;padding:8px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--dim2);font-size:10px;font-weight:700}
.sbtn.active-b{border-color:var(--green);color:var(--green);background:rgba(0,255,176,0.05)}
.sbtn.active-c{border-color:var(--red);color:var(--red);background:rgba(255,45,94,0.05)}

.abody{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px;position:relative}

/* MÉTRICAS */
.st-label{font-size:9px;color:var(--dim2);text-transform:uppercase;margin-bottom:5px;display:flex;justify-content:space-between}
.bar-w{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;margin-bottom:12px}
.bar-f{height:100%;transition:width 0.4s ease}

#supreme{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
#supreme.active{display:flex}
</style>
</head>
<body>

<div class="screen active" id="s-setup">
  <div class="setup-card">
    <div style="font-family:'Orbitron';color:var(--green);font-size:24px;margin-bottom:10px">SNIPER<span>PRO</span> v7.2</div>
    <input class="fi" id="token" type="password" placeholder="Deriv API Token">
    <button class="btn-go" id="start-btn" onclick="startApp()">INICIAR SISTEMA</button>
  </div>
</div>

<div class="screen" id="s-app">
  <div class="hdr">
    <div style="font-family:'Orbitron';font-size:14px;color:var(--green)">SNIPER<span>v7.2</span></div>
    <div id="ping" style="font-size:9px;color:var(--dim2)">0ms</div>
  </div>

  <div class="sbar" id="symbol-bar"></div>

  <div class="abody">
    <div class="card">
      <div id="sym-label" style="font-size:10px;color:var(--dim2);letter-spacing:2px">B1000 SNIPER CORE</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div id="price" style="font-size:32px;font-weight:900">0.00</div>
        <div id="macro-tag" style="font-size:9px;padding:2px 6px;border-radius:4px;background:var(--dim)">MACRO: --</div>
      </div>
    </div>

    <div class="card">
      <div class="st-label"><span>Inminencia Exponencial</span><span id="imm-txt">0%</span></div>
      <div class="bar-w"><div id="imm-bar" class="bar-f" style="width:0%;background:var(--amber)"></div></div>
      
      <div class="st-label"><span>Compresión ATR</span><span id="atr-txt">0%</span></div>
      <div class="bar-w"><div id="atr-bar" class="bar-f" style="width:0%;background:var(--blue)"></div></div>
      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="background:rgba(0,255,176,0.03);padding:10px;border-radius:8px;text-align:center">
          <div class="st-label" style="justify-content:center">IA PROB</div>
          <div id="ml-pct" style="font-size:24px;font-weight:900;color:var(--green)">50%</div>
        </div>
        <div style="background:rgba(168,85,247,0.03);padding:10px;border-radius:8px;text-align:center">
          <div class="st-label" style="justify-content:center">GRAVEDAD (Z)</div>
          <div id="grav-val" style="font-size:24px;font-weight:900;color:var(--purple)">0.00</div>
        </div>
      </div>
    </div>

    <div id="chart-container" style="height:230px;background:var(--bg2);border-radius:12px;border:1px solid var(--border)"></div>
  </div>
</div>

<div id="supreme">
  <div style="font-family:'Orbitron';color:var(--green);letter-spacing:5px;font-size:12px">ALINEACIÓN SNIPER</div>
  <div id="sa-dir" style="font-size:48px;font-weight:900;margin:20px 0;color:#fff">---</div>
  <button class="btn-go" onclick="document.getElementById('supreme').classList.remove('active')">CONFIRMAR</button>
</div>

<script>
// ── TODOS LOS ÍNDICES RESTAURADOS ──
const SYMBOLS = [
  {id:'BOOM1000', label:'B1000', type:'boom', limit:160},
  {id:'BOOM500',  label:'B500',  type:'boom', limit:110},
  {id:'BOOM300N', label:'B300',  type:'boom', limit:80},
  {id:'CRASH1000',label:'C1000', type:'crash',limit:160},
  {id:'CRASH500', label:'C500',  type:'crash',limit:110},
  {id:'CRASH300N',label:'C300',  type:'crash',limit:80}
];

const S = {
  token: '', sym: SYMBOLS[0], data: [], model: null,
  isCalculating: false, lastInference: 0,
  ui: { chart: null, series: null }, ws: null
};

async function initIA() {
  S.model = tf.sequential();
  S.model.add(tf.layers.dense({units: 12, inputShape:[50], activation:'tanh'}));
  S.model.add(tf.layers.dense({units: 1, activation:'sigmoid'}));
  S.model.compile({optimizer: 'adam', loss: 'binaryCrossentropy'});
}

async function startApp() {
  S.token = document.getElementById('token').value;
  if(!S.token) return alert("Token requerido");
  document.getElementById('s-setup').classList.remove('active');
  document.getElementById('s-app').classList.add('active');
  
  // Pequeño delay para que el contenedor del chart tenga dimensiones reales
  setTimeout(() => {
    initChart();
    buildSymbols();
    initIA().then(connect);
  }, 300);
}

function initChart() {
  const container = document.getElementById('chart-container');
  S.ui.chart = LightweightCharts.createChart(container, {
    layout: { background: { color: '#0a0f1e' }, textColor: '#5a7090', fontSize: 10 },
    grid: { vertLines: { visible: false }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
    timeScale: { borderVisible: false, secondsVisible: true },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal }
  });
  // VELAS REALES RESTAURADAS
  S.ui.series = S.ui.chart.addCandlestickSeries({
    upColor: '#00ffb0', downColor: '#ff2d5e', borderVisible: false,
    wickUpColor: '#00ffb0', wickDownColor: '#ff2d5e'
  });
}

function buildSymbols() {
  const bar = document.getElementById('symbol-bar');
  bar.innerHTML = '';
  SYMBOLS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = `sbtn ${s.id === S.sym.id ? (s.type==='boom'?'active-b':'active-c') : ''}`;
    btn.textContent = s.label;
    btn.onclick = () => { S.sym = s; S.data = []; buildSymbols(); connect(); };
    bar.appendChild(btn);
  });
  document.getElementById('sym-label').textContent = S.sym.label + " SNIPER CORE";
}

async function runInference() {
  if (S.isCalculating || S.data.length < 50) return;
  const now = Date.now();
  if (now - S.lastInference < 600) return;

  S.isCalculating = true;
  S.lastInference = now;

  const result = tf.tidy(() => {
    const raw = S.data.slice(-50);
    const mean = raw.reduce((a, b) => a + b) / 50;
    const std = Math.sqrt(raw.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / 50) || 0.001;
    const normalized = raw.map(v => (v - mean) / std);
    const input = tf.tensor2d([normalized]);
    return { prob: S.model.predict(input).dataSync()[0], std };
  });

  requestAnimationFrame(() => {
    document.getElementById('ml-pct').textContent = (result.prob * 100).toFixed(0) + "%";
    document.getElementById('grav-val').textContent = (result.std / 10).toFixed(2);
    if (result.prob > 0.85 || result.prob < 0.15) {
      document.getElementById('supreme').classList.add('active');
      document.getElementById('sa-dir').textContent = result.prob > 0.5 ? "CALL" : "PUT";
    }
  });

  await tf.nextFrame();
  S.isCalculating = false;
}

function connect() {
  if (S.ws) S.ws.close();
  let startTime = Date.now();
  S.ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

  S.ws.onopen = () => {
    S.ws.send(JSON.stringify({authorize: S.token}));
    // PETICIÓN DE VELAS PARA LA GRÁFICA
    S.ws.send(JSON.stringify({ticks_history: S.sym.id, style:'candles', granularity:60, count:50, subscribe:1}));
    S.ws.send(JSON.stringify({ticks: S.sym.id, subscribe:1}));
  };

  S.ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    // CARGAR VELAS INICIALES Y ACTUALIZAR
    if (d.msg_type === 'candles') {
      const candles = d.candles.map(c => ({time:c.epoch, open:Number(c.open), high:Number(c.high), low:Number(c.low), close:Number(c.close)}));
      S.ui.series.setData(candles);
    }
    if (d.msg_type === 'ohlc' && d.ohlc.symbol === S.sym.id) {
       const o = d.ohlc;
       S.ui.series.update({time:o.open_time, open:Number(o.open), high:Number(o.high), low:Number(o.low), close:Number(o.close)});
    }
    if (d.msg_type === 'tick' && d.tick.symbol === S.sym.id) {
      const p = Number(d.tick.quote);
      const now = Date.now();
      document.getElementById('ping').textContent = (now - startTime) + "ms";
      startTime = now;
      document.getElementById('price').textContent = p.toFixed(2);
      S.data.push(p);
      if (S.data.length > 150) S.data.shift();
      runInference();
    }
  };
}
</script>
</body>
</html>
