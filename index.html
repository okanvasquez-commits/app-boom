<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050912">
<title>SynthRadar v7.2 Sniper Pro</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
/* CORE SNIPER PRO - CSS OPTIMIZADO */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050912;--bg2:#0a0f1e;--bg3:#0f1528;
  --green:#00ffb0;--red:#ff2d5e;--amber:#ffb020;--blue:#3b82f6;--purple:#a855f7;
  --text:#d4dff5;--dim:#3d5070;--dim2:#5a7090;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'JetBrains Mono',monospace;color:var(--text)}

.screen{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* SETUP SCREEN */
.setup-box{margin:auto;width:90%;max-width:340px;background:var(--bg2);padding:30px;border-radius:12px;border:1px solid rgba(0,255,176,0.1);text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.5)}
.setup-box input{width:100%;padding:16px;background:var(--bg3);border:1px solid #1e2a44;color:#fff;margin:20px 0;border-radius:6px;text-align:center;font-family:inherit}

/* APP INTERFACE */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:15px;background:rgba(5,9,18,0.95);border-bottom:1px solid rgba(0,255,176,0.1)}
.sbar{display:flex;gap:8px;padding:12px;overflow-x:auto;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,0.03)}
.sbar::-webkit-scrollbar{display:none}

.sbtn{flex-shrink:0;padding:10px 16px;border-radius:6px;border:1px solid rgba(255,255,255,0.05);background:#161f36;color:var(--dim2);font-size:10px;font-weight:700;font-family:'Orbitron'}
.sbtn.active-b{border-color:var(--green);color:var(--green);background:rgba(0,255,176,0.05);box-shadow:0 0 10px rgba(0,255,176,0.2)}
.sbtn.active-c{border-color:var(--red);color:var(--red);background:rgba(255,45,94,0.05);box-shadow:0 0 10px rgba(255,45,94,0.2)}

.abody{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:15px}
.card{background:var(--bg2);border:1px solid rgba(0,255,176,0.05);border-radius:12px;padding:18px}
.st-label{font-size:9px;color:var(--dim2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;justify-content:space-between}

/* BARS & METRICS */
.bar-w{height:6px;background:rgba(255,255,255,0.03);border-radius:3px;overflow:hidden;margin-bottom:15px}
.bar-f{height:100%;transition:width 0.4s cubic-bezier(0.4, 0, 0.2, 1)}

#chart-container{height:250px;border-radius:12px;overflow:hidden;background:var(--bg2);border:1px solid rgba(255,255,255,0.03)}

/* ALERTA SUPREME */
#supreme{position:fixed;inset:0;z-index:1000;background:rgba(5,9,18,0.98);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
#supreme.active{display:flex}
.btn-go{background:var(--green);color:#000;border:none;padding:18px;border-radius:8px;width:100%;font-weight:900;font-family:'Orbitron';letter-spacing:1px}
</style>
</head>
<body>

<div class="screen active" id="s-setup">
  <div class="setup-box">
    <div style="font-family:'Orbitron';color:var(--green);font-size:24px;font-weight:900;letter-spacing:2px">SNIPER<span>RADAR</span></div>
    <div style="font-size:9px;color:var(--dim2);margin-top:5px;letter-spacing:4px">QUANTUM ENGINE v7.2</div>
    <input id="token" type="password" placeholder="DERIV API TOKEN">
    <button class="btn-go" onclick="startApp()">INICIALIZAR NÚCLEO IA</button>
  </div>
</div>

<div class="screen" id="s-app">
  <div class="hdr">
    <div style="font-family:'Orbitron';font-size:13px;font-weight:900;color:var(--green)">SNIPER PRO</div>
    <div id="ping" style="font-size:9px;color:var(--dim2);font-family:'JetBrains Mono'">LATENCY: --ms</div>
  </div>

  <div class="sbar" id="symbol-bar"></div>

  <div class="abody">
    <div class="card">
      <div id="sym-label" style="font-size:10px;color:var(--dim2);letter-spacing:2px;margin-bottom:5px">CALIBRANDO...</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div id="price" style="font-size:34px;font-weight:900;font-family:'Orbitron'">0.00</div>
        <div id="macro-tag" style="font-size:9px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.05)">MACRO: --</div>
      </div>
    </div>

    <div class="card">
      <div class="st-label"><span>Inminencia Exponencial</span><span id="imm-txt">0%</span></div>
      <div class="bar-w"><div id="imm-bar" class="bar-f" style="width:0%;background:var(--amber)"></div></div>
      
      <div class="st-label"><span>Compresión ATR</span><span id="atr-txt">0%</span></div>
      <div class="bar-w"><div id="atr-bar" class="bar-f" style="width:0%;background:var(--blue)"></div></div>
      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div style="background:rgba(0,255,176,0.04);padding:15px;border-radius:10px;text-align:center;border:1px solid rgba(0,255,176,0.05)">
          <div class="st-label" style="justify-content:center">IA PROB</div>
          <div id="ml-pct" style="font-size:26px;font-weight:900;color:var(--green)">50%</div>
        </div>
        <div style="background:rgba(168,85,247,0.04);padding:15px;border-radius:10px;text-align:center;border:1px solid rgba(168,85,247,0.05)">
          <div class="st-label" style="justify-content:center">GRAVEDAD (Z)</div>
          <div id="grav-val" style="font-size:26px;font-weight:900;color:var(--purple)">0.00</div>
        </div>
      </div>
    </div>

    <div id="chart-container"></div>
  </div>
</div>

<div id="supreme">
  <div style="font-family:'Orbitron';color:var(--green);letter-spacing:6px;font-size:12px">ALINEACIÓN DETECTADA</div>
  <div id="sa-dir" style="font-size:42px;font-weight:900;margin:25px 0;font-family:'Orbitron'">---</div>
  <button class="btn-go" onclick="document.getElementById('supreme').classList.remove('active')">CONFIRMAR SNIPER</button>
</div>

<script>
const SYMBOLS = [
  {id:'BOOM1000', label:'B1000', type:'boom'},
  {id:'BOOM500',  label:'B500',  type:'boom'},
  {id:'CRASH1000',label:'C1000', type:'crash'},
  {id:'CRASH500', label:'C500',  type:'crash'}
];

const S = {
  token: '', sym: SYMBOLS[0], data: [], model: null,
  isCalculating: false, lastInference: 0,
  ui: { chart: null, series: null }, ws: null
};

// MOTOR IA - CALIBRACIÓN Z-SCORE (ANTI-ESTANCAMIENTO)
async function initIA() {
  S.model = tf.sequential();
  S.model.add(tf.layers.dense({units: 12, inputShape:[50], activation:'tanh'}));
  S.model.add(tf.layers.dense({units: 1, activation:'sigmoid'}));
  S.model.compile({optimizer: tf.train.adam(0.001), loss: 'binaryCrossentropy'});
}

async function startApp() {
  S.token = document.getElementById('token').value;
  if(!S.token) return alert("TOKEN REQUERIDO");
  document.getElementById('s-setup').classList.remove('active');
  document.getElementById('s-app').classList.add('active');
  
  initChart();
  buildSymbols();
  await initIA();
  connect();
}

function initChart() {
  const container = document.getElementById('chart-container');
  S.ui.chart = LightweightCharts.createChart(container, {
    layout: { background: { color: '#0a0f1e' }, textColor: '#5a7090', fontSize: 10 },
    grid: { vertLines: { visible: false }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
    timeScale: { borderVisible: false, secondsVisible: true }
  });
  S.ui.series = S.ui.chart.addCandlestickSeries({ 
    upColor:'#00ffb0', downColor:'#ff2d5e', borderVisible:false, wickUpColor:'#00ffb0', wickDownColor:'#ff2d5e' 
  });
}

function buildSymbols() {
  const bar = document.getElementById('symbol-bar');
  bar.innerHTML = '';
  SYMBOLS.forEach(s => {
    const btn = document.createElement('button');
    const isActive = s.id === S.sym.id;
    btn.className = `sbtn ${isActive ? (s.type==='boom'?'active-b':'active-c') : ''}`;
    btn.textContent = s.label;
    btn.onclick = () => { 
      if(S.sym.id === s.id) return;
      S.sym = s; S.data = []; 
      buildSymbols(); 
      connect(); 
    };
    bar.appendChild(btn);
  });
  document.getElementById('sym-label').textContent = S.sym.label + " SNIPER CORE";
}

async function runQuantumInference() {
  if (S.isCalculating || S.data.length < 50) return;
  const now = Date.now();
  if (now - S.lastInference < 600) return; // Marcapasos para no saturar el móvil

  S.isCalculating = true;
  S.lastInference = now;

  const result = tf.tidy(() => {
    try {
      const raw = S.data.slice(-50);
      const mean = raw.reduce((a, b) => a + b) / 50;
      const std = Math.sqrt(raw.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / 50) || 0.0001;
      
      // Normalización Z-Score: Clave para que la probabilidad oscile con fuerza
      const normalized = raw.map(v => (v - mean) / std);
      const input = tf.tensor2d([normalized]);
      const prob = S.model.predict(input).dataSync()[0];
      return { prob, std };
    } catch(e) { return null; }
  });

  if (result) {
    requestAnimationFrame(() => {
      const p = result.prob;
      document.getElementById('ml-pct').textContent = (p * 100).toFixed(0) + "%";
      document.getElementById('ml-pct').style.color = p > 0.55 ? 'var(--green)' : p < 0.45 ? 'var(--red)' : 'var(--text)';
      
      const grav = (result.std / (S.sym.type === 'boom' ? 5 : 2)).toFixed(2);
      document.getElementById('grav-val').textContent = grav;
      
      // Simulación de Inminencia basada en Volatilidad (Z-Score)
      const imm = Math.min(100, (result.std * 10)).toFixed(0);
      document.getElementById('imm-txt').textContent = imm + "%";
      document.getElementById('imm-bar').style.width = imm + "%";

      if (p > 0.88 || p < 0.12) {
        document.getElementById('supreme').classList.add('active');
        document.getElementById('sa-dir').textContent = p > 0.5 ? "CALL / BOOM" : "PUT / CRASH";
        document.getElementById('sa-dir').style.color = p > 0.5 ? "var(--green)" : "var(--red)";
      }
    });
  }

  await tf.nextFrame(); // Libera el hilo principal
  S.isCalculating = false;
}

function connect() {
  if (S.ws) S.ws.close();
  let startTime = Date.now();
  S.ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

  S.ws.onopen = () => {
    S.ws.send(JSON.stringify({authorize: S.token}));
    S.ws.send(JSON.stringify({ticks_history: S.sym.id, style:'candles', granularity:60, count:50, subscribe:1}));
    S.ws.send(JSON.stringify({ticks: S.sym.id, subscribe:1}));
  };

  S.ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    if (d.msg_type === 'candles') {
      const candles = d.candles.map(c => ({time:c.epoch, open:Number(c.open), high:Number(c.high), low:Number(c.low), close:Number(c.close)}));
      S.ui.series.setData(candles);
    }
    if (d.msg_type === 'tick') {
      const p = Number(d.tick.quote);
      const now = Date.now();
      document.getElementById('ping').textContent = (now - startTime) + "ms";
      startTime = now;
      
      document.getElementById('price').textContent = p.toFixed(2);
      S.data.push(p);
      if (S.data.length > 150) S.data.shift(); // Control de memoria RAM
      runInference();
    }
  };
}
</script>
</body>
</html>
